<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#grad)" rx="40"/>
  
  <!-- Outer ring -->
  <!-- <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="3" opacity="0.3"/> -->
  
  <!-- Main icon: Upward trend line -->
  <g transform="translate(20, 57.5)">
    <!-- Trend path -->
    <polyline points="10,80 55,35 100,45 150,5" 
              stroke="white" 
              stroke-width="6" 
              fill="none" 
              stroke-linecap="round" 
              stroke-linejoin="round"/>
    
    <!-- Data points -->
    <circle cx="10" cy="80" r="6" fill="white"/>
    <circle cx="55" cy="35" r="6" fill="white"/>
    <circle cx="100" cy="45" r="6" fill="white"/>
    <circle cx="150" cy="5" r="7" fill="#f09433"/>
  </g>
  
  <!-- Center accent bar -->
  <!-- <rect x="85" y="50" width="30" height="100" fill="white" opacity="0.1" rx="4"/> -->
</svg>

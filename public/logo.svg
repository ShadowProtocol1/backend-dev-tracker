<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#grad)" rx="40"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>
  
  <!-- Main icon: Upward trend line -->
  <g transform="translate(50, 85)">
    <!-- Baseline -->
    <line x1="0" y1="40" x2="100" y2="40" stroke="white" stroke-width="2.5" opacity="0.4"/>
    
    <!-- Trend path -->
    <polyline points="10,35 35,20 60,25 85,5" 
              stroke="white" 
              stroke-width="4" 
              fill="none" 
              stroke-linecap="round" 
              stroke-linejoin="round"/>
    
    <!-- Data points -->
    <circle cx="10" cy="35" r="4" fill="white"/>
    <circle cx="35" cy="20" r="4" fill="white"/>
    <circle cx="60" cy="25" r="4" fill="white"/>
    <circle cx="85" cy="5" r="5" fill="#f09433"/>
  </g>
  
  <!-- Center accent bar -->
  <!-- <rect x="85" y="50" width="30" height="100" fill="white" opacity="0.1" rx="4"/> -->
</svg>

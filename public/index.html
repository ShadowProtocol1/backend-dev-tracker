<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>DevTracker Control Center</title>
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen", "Ubuntu", 
				"Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			padding: 20px;
			color: #333;
		}

		.container {
			max-width: 1400px;
			margin: 0 auto;
		}

		header {
			background: white;
			padding: 30px;
			border-radius: 12px;
			margin-bottom: 30px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 20px;
		}

		.header-left h1 {
			font-size: 28px;
			color: #667eea;
			margin-bottom: 5px;
		}

		.header-left p {
			color: #888;
			font-size: 14px;
		}

		.header-right {
			display: flex;
			gap: 15px;
			align-items: center;
		}

		.status-badge {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 8px 16px;
			border-radius: 20px;
			font-size: 13px;
			font-weight: 600;
		}

		.status-online {
			background: #d4edda;
			color: #155724;
		}

		.status-offline {
			background: #f8d7da;
			color: #721c24;
		}

		.dot {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			display: inline-block;
		}

		.dot-green {
			background: #28a745;
			animation: pulse 2s infinite;
		}

		.dot-red {
			background: #dc3545;
		}

		@keyframes pulse {
			0%, 100% {
				opacity: 1;
			}
			50% {
				opacity: 0.5;
			}
		}
		/* ...rest of dashboard.html content... */
	</style>
</head>
<body>
	<!-- ...rest of dashboard.html content... -->
</body>
</html>
